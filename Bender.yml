# A more detailed description of the manifest format `Bender.yml` can be found here:
# https://github.com/pulp-platform/bender#manifest-format-benderyml

package:
  name: socc_on_croc
  authors:
    - "Mikail Gedik <mgedik@student.ethz.ch>"
    - "Thomas Herzog <thherzog@student.ethz.ch>"

dependencies:
  common_cells:         { git: "https://github.com/pulp-platform/common_cells.git",         version: 1.39.0 }
  obi:                  { git: "https://github.com/pulp-platform/obi.git",                  rev: 6a724da    } # 0.1.7+
  tech_cells_generic:   { git: "https://github.com/pulp-platform/tech_cells_generic.git",   rev: fca524a    } # 0.2.13+

sources:
  - include_dirs:
      - rtl/generated/include
    files:
      - rtl/*.sv
      - rtl/generated/*.sv
  - target: any(fpga, xilinx, vsim, verilator)
    files:
      - rtl/testing/*.sv
  - target: all(fpga, xilinx)
    files:
      - target/fpga/top.sv
      - target/fpga/plle2_adv.sv
  - target: any(verilator, vsim)
    files:
      - target/sim/rtl/*.sv
    